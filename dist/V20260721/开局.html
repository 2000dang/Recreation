<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>环晓科技 · 入职建档向导</title>
    <style>
        :root {
            --bg: #100a18;
            --surface: #181024;
            --text: #d8d0ea;
            --text-sub: #8a7fa8;
            --accent: #9b6dff;
            --accent-dark: #6d4bb0;
            --accent-soft: rgba(155, 109, 255, 0.14);
            --ok: #5fd0ff;
            --font-ui: 'Noto Sans SC', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            color: var(--text);
            font-family: var(--font-ui);
            line-height: 1.7;
        }
        .wizard-layout {
            max-width: 640px;
            margin: 0 auto;
            padding: 18px 16px 28px;
        }
        .wiz-head {
            text-align: center;
            margin-bottom: 14px;
        }
        .wiz-head .tag {
            font-size: 0.62rem;
            letter-spacing: 0.4rem;
            color: var(--accent);
            text-transform: uppercase;
            font-family: monospace;
        }
        .wiz-head h2 {
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: 0.15rem;
            margin-top: 4px;
        }
        .steps {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .step-dot {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(155,109,255,0.1);
            color: var(--text-sub);
        }
        .step-dot.active { background: var(--accent); color: #fff; }
        .panel { display: none; }
        .panel.active { display: block; }
        .field {
            margin-bottom: 12px;
        }
        .field label {
            display: block;
            font-size: 0.78rem;
            color: var(--text-sub);
            margin-bottom: 4px;
        }
        .field input, .field select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(155,109,255,0.3);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font-ui);
        }
        .field input:focus, .field select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-soft);
        }
        .hint {
            font-size: 0.7rem;
            color: var(--text-sub);
            margin-top: 2px;
        }
        .nav {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-top: 18px;
        }
        button.wiz {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
            cursor: pointer;
            font-family: var(--font-ui);
        }
        .wiz.primary { background: var(--accent); color: #100a18; }
        .wiz.primary:hover { background: #fff; }
        .wiz.ghost { background: rgba(255,255,255,0.06); color: var(--text); }
        .wiz.ghost:hover { background: rgba(255,255,255,0.12); }
        .wiz:disabled { opacity: 0.35; pointer-events: none; }
        .err { color: #e74c3c; font-size: 0.78rem; min-height: 18px; margin-top: 8px; text-align: center; }
        .skip {
            display: block;
            width: 100%;
            margin-top: 10px;
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 0.75rem;
            text-decoration: underline;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--accent-dark);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 999;
        }
        .toast.show { opacity: 1; }
        .toast.success { border-color: var(--ok); }
        .toast.error { border-color: #e74c3c; }
    </style>
</head>
<body>
<div class="wizard-layout">
    <div class="wiz-head">
        <div class="tag">EMPLOYEE ONBOARDING</div>
        <h2>环晓科技 · 入职建档向导</h2>
    </div>

    <div class="steps">
        <div class="step-dot active" id="dot-1">① 身份信息</div>
        <div class="step-dot" id="dot-2">② 资产权限</div>
        <div class="step-dot" id="dot-3">③ 初始助理</div>
    </div>

    <!-- Step 1 -->
    <div class="panel active" id="panel-1">
        <div class="field">
            <label>你的姓名 / 代号</label>
            <input id="f-name" type="text" placeholder="例如：零 / 林深 / 自定义" value="零" />
        </div>
        <div class="field">
            <label>工号（员工系统唯一标识）</label>
            <input id="f-empId" type="text" value="HX-0001" />
        </div>
        <div class="field">
            <label>职级</label>
            <select id="f-rank">
                <option>实习生</option>
                <option>初级专员</option>
                <option>中级专员</option>
                <option>高级专员</option>
                <option>主管</option>
                <option>副组长</option>
                <option selected>组长</option>
                <option>副总监</option>
                <option>总监</option>
            </select>
            <div class="hint">职位越高，催眠权限等级与可调用资源越强。</div>
        </div>
        <div class="err" id="err-1"></div>
        <div class="nav">
            <button class="wiz primary" onclick="next(2)">下一步</button>
        </div>
    </div>

    <!-- Step 2 -->
    <div class="panel" id="panel-2">
        <div class="field">
            <label>贡献点（员工系统硬通货）</label>
            <input id="f-credit" type="number" value="5" />
            <div class="hint">换发型1 / 普通指令10 / 强制主奴20；破解模式开启后显示为 ∞。</div>
        </div>
        <div class="field">
            <label>个人金钱（¥）</label>
            <input id="f-money" type="number" value="5000" />
        </div>
        <div class="field">
            <label>催眠权限等级</label>
            <select id="f-perm">
                <option value="1">Lv.1 正式员工</option>
                <option value="2">Lv.2 副组长</option>
                <option value="3">Lv.3 组长</option>
                <option value="4">Lv.4 副总监</option>
                <option value="5">Lv.5 总监</option>
            </select>
        </div>
        <div class="field">
            <label>破解模式</label>
            <select id="f-crack">
                <option value="关闭" selected>关闭（常规流程）</option>
                <option value="绝对权限">绝对权限（忽略贡献点/冷却/权限）</option>
            </select>
        </div>
        <div class="err" id="err-2"></div>
        <div class="nav">
            <button class="wiz ghost" onclick="setStep(1)">上一步</button>
            <button class="wiz primary" onclick="next(3)">下一步</button>
        </div>
    </div>

    <!-- Step 3 -->
    <div class="panel" id="panel-3">
        <div class="field">
            <label>初始助理：杨玉兰（实习助理，18岁）</label>
            <div class="hint">实习助理已默认在场；可微调初始状态。</div>
        </div>
        <div class="field">
            <label>情绪</label>
            <input id="f-yll-mood" type="text" value="不耐烦" />
        </div>
        <div class="field">
            <label>三围</label>
            <input id="f-yll-bw" type="text" value="85/60/88" />
        </div>
        <div class="field">
            <label>罩杯</label>
            <input id="f-yll-cup" type="text" value="D" />
        </div>
        <div class="field">
            <label>催眠状态</label>
            <select id="f-yll-hyp">
                <option selected>未被催眠</option>
                <option>心无旁骛</option>
                <option>普通指令</option>
                <option>强制主奴</option>
            </select>
        </div>
        <div class="err" id="err-3"></div>
        <div class="nav">
            <button class="wiz ghost" onclick="setStep(2)">上一步</button>
            <button class="wiz primary" onclick="descend()">完成建档 · 进入剧情</button>
        </div>
        <button class="skip" onclick="skipDescend()">跳过建档，直接降临环晓科技</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
    'use strict';
    function $(id) { return document.getElementById(id); }

    function toast(msg, type) {
        var t = $('toast');
        if (!t) return;
        t.textContent = msg;
        t.className = 'toast show' + (type ? ' ' + type : '');
        setTimeout(function () { t.className = 'toast' + (type ? ' ' + type : ''); }, 2200);
    }

    window.setStep = function (n) {
        for (var i = 1; i <= 3; i++) {
            var p = $('panel-' + i); if (p) p.classList.toggle('active', i === n);
            var d = $('dot-' + i); if (d) d.classList.toggle('active', i === n);
        }
    };
    window.next = function (n) {
        if (n === 2 && !$('f-name').value.trim()) {
            $('err-1').textContent = '请填写姓名 / 代号'; return;
        }
        window.setStep(n);
    };

    function collect() {
        return {
            name: $('f-name').value.trim() || '零',
            empId: $('f-empId').value.trim() || 'HX-0001',
            rank: $('f-rank').value,
            credit: Math.max(0, Number($('f-credit').value) || 0),
            money: Math.max(0, Number($('f-money').value) || 0),
            perm: Number($('f-perm').value) || 1,
            crackMode: $('f-crack').value,
            yll: {
                mood: $('f-yll-mood').value.trim() || '不耐烦',
                bw: $('f-yll-bw').value.trim() || '85/60/88',
                cup: $('f-yll-cup').value.trim() || 'D',
                hyp: $('f-yll-hyp').value
            }
        };
    }

    // === MVU 同步（使用 _.set 深层写入 + replaceMvuData，对齐 轮回战场 模式）===
    function syncMVU(d) {
        try {
            var win = window.parent || window;
            if (!win.Mvu || !win._ || typeof win.Mvu.getMvuData !== 'function') {
                if (win.Mvu && typeof win.Mvu.updateVariable === 'function') {
                    win.Mvu.updateVariable('主角状态', {
                        工号: d.empId, 职级: d.rank, 贡献点: d.credit,
                        '个人金钱': d.money, '破解模式': d.crackMode !== '关闭',
                        '催眠权限等级': d.perm
                    });
                    return true;
                }
                return false;
            }
            var cloned = win.Mvu.getMvuData({ type: 'message', message_id: 'latest' });
            if (!cloned || !cloned.stat_data) return false;
            cloned = win._.cloneDeep ? win._.cloneDeep(cloned) : JSON.parse(JSON.stringify(cloned));
            if (!cloned.stat_data['主角状态']) cloned.stat_data['主角状态'] = {};
            var ps = cloned.stat_data['主角状态'];
            win._.set(ps, '工号', d.empId);
            win._.set(ps, '职级', d.rank);
            win._.set(ps, '贡献点', d.credit);
            win._.set(ps, '个人金钱', d.money);
            win._.set(ps, '催眠权限等级', d.perm);
            win._.set(ps, '破解模式', d.crackMode !== '关闭');

            if (!cloned.stat_data['助理管理']) cloned.stat_data['助理管理'] = {};
            if (!cloned.stat_data['助理管理']['实习助理']) cloned.stat_data['助理管理']['实习助理'] = {};
            var rec = cloned.stat_data['助理管理']['实习助理'];
            if (!rec['杨玉兰']) rec['杨玉兰'] = {};
            var a = rec['杨玉兰'];
            win._.set(a, '类型', '实习助理');
            win._.set(a, '在场', true);
            win._.set(a, '状态', '正常');
            win._.set(a, '情绪', d.yll.mood);
            win._.set(a, '催眠状态', d.yll.hyp);
            win._.set(a, '三围', d.yll.bw);
            win._.set(a, '罩杯', d.yll.cup);
            win._.set(a, '改造状态', '无');
            win._.set(a, '归属', '{{user}}的助理');

            win.Mvu.replaceMvuData(cloned, { type: 'message', message_id: 'latest' });
            try { win.Mvu.replaceMvuData(cloned, { type: 'chat' }); } catch (e2) {}
            try {
                var evt = win.Mvu.events && win.Mvu.events.VARIABLE_UPDATE_ENDED;
                if (evt && typeof win.eventEmit === 'function') win.eventEmit(evt, cloned, cloned);
            } catch (e3) {}
            console.log('✅ MVU 主角状态已同步 (_.set 深度写入)');
            return true;
        } catch (e) {
            console.warn('[开局] MVU同步失败(非致命):', e.message);
            return false;
        }
    }

    // === 发送到酒馆 ===
    function sendToTavern(text) {
        try {
            var win = window.parent || window;
            var ta = win.document.getElementById('send_textarea');
            var btn = win.document.getElementById('send_but');
            if (ta && btn) {
                ta.value = text;
                ta.dispatchEvent(new Event('input', { bubbles: true }));
                btn.click();
                toast('正在降临环晓科技...', 'success');
                try { parent.postMessage({ type: 'embed-resize', height: 0 }, '*'); } catch (e) {}
                return true;
            } else {
                console.log(text);
                toast('未检测到酒馆界面，已输出到控制台', 'error');
                return false;
            }
        } catch (e) {
            console.error(e);
            toast('跨域访问受限，无法自动发送', 'error');
            return false;
        }
    }

    function buildPrompt(d) {
        var parts = [];
        parts.push('【角色建档完成】');
        parts.push('姓名：' + d.name + '　工号：' + d.empId + '　职级：' + d.rank);
        parts.push('催眠权限等级：Lv.' + d.perm + '　贡献点：' + d.credit + '　个人资金：¥' + d.money);
        parts.push('破解模式：' + (d.crackMode === '关闭' ? '普通模式' : '绝对权限'));
        parts.push('初始助理：杨玉兰（' + d.yll.mood + ' / 三围 ' + d.yll.bw + ' / 罩杯 ' + d.yll.cup + ' / 催眠·' + d.yll.hyp + '）');
        parts.push('');
        parts.push('【系统指令】');
        parts.push('你是角色卡「催眠助理·环晓科技」的叙事引擎。请基于以上建档数据，生成一段沉浸式开局场景：');
        parts.push('1. 环境描写：' + d.name + ' 以研发部新入职博士的身份，于清晨走入环晓科技大厦——一座融合脑机接口与催眠科技的超级企业总部。第一人称视角，刻画大堂的赛博质感、专属终端弹出的员工界面、擦肩而过的工作人员微表情。');
        parts.push('2. 角色引入：自然引出 1-2 名女性员工 / 助理（杨玉兰、卫璎、娄琛雨等角色池）与主角的首次互动。据职级(' + d.rank + ')呈现合理的职场层级关系。');
        parts.push('3. 系统展示：通过员工终端界面，简要展示贡献点系统、催眠权限评级的存在——但不要一次性堆砌数据，让主角在剧情中"发现"自己的权限与资源。');
        if (d.crackMode !== '关闭') {
            parts.push('4. 暗线铺垫：绝对权限模式已激活。在场景中植入 1-2 处微妙异常细节（如系统日志闪现、防火墙警报静默、某位 NPC 眼神中带着不同寻常的"认识"），暗示公司表层运作之下存在更深的秘密。');
        } else {
            parts.push('4. 暗线铺垫：在场景中植入 1-2 处微妙异常细节（如走廊尽头门禁系统一声异常蜂鸣、电梯镜面中出现不该存在的倒影），暗示公司表层运作之下存在更深的秘密。');
        }
        parts.push('5. 基调：科幻职场悬疑。保持专业冷静的科技公司氛围，对话自然有张力。');
        parts.push('6. 叙事准则：直接以场景描写开始，无需寒暄。绝对禁止任何色情或露骨性描写。将建档信息融合到开场叙事中，而非机械罗列。');
        parts.push('7. 变量接入：角色档案已写入 MVU 系统，请基于职级与权限自然体现在叙事中。');
        return parts.join('\n');
    }

    window.descend = function () {
        var d = collect();
        syncMVU(d);
        var prompt = buildPrompt(d);
        sendToTavern(prompt);
    };

    window.skipDescend = function () {
        var d = {
            name: '零', empId: 'HX-0001', rank: '组长', credit: 5, money: 5000,
            perm: 3, crackMode: '关闭',
            yll: { mood: '不耐烦', bw: '85/60/88', cup: 'D', hyp: '未被催眠' }
        };
        syncMVU(d);
        sendToTavern(buildPrompt(d));
    };

    // === 自适配 iframe 高度 ===
    function installHeight() {
        var app = document.querySelector('.wizard-layout') || document.body;
        function getH() {
            var b = document.body;
            var bs = b ? getComputedStyle(b) : null;
            var pt = bs ? (parseFloat(bs.paddingTop) || 0) : 0;
            var pb = bs ? (parseFloat(bs.paddingBottom) || 0) : 0;
            var rect = app.getBoundingClientRect();
            return Math.max(1, Math.ceil(Math.max(app.scrollHeight || 0, app.offsetHeight || 0, rect.height || 0) + pt + pb));
        }
        function apply() {
            try { if (window.frameElement) { window.frameElement.style.minHeight = '0px'; window.frameElement.style.height = getH() + 'px'; } } catch (e) {}
        }
        function queue() { if (window.requestAnimationFrame) requestAnimationFrame(apply); else apply(); }
        if (window.ResizeObserver) { var ro = new ResizeObserver(queue); ro.observe(app); }
        if (window.MutationObserver) { var mo = new MutationObserver(queue); mo.observe(app, { childList: true, subtree: true, attributes: true }); }
        window.addEventListener('load', queue);
        window.addEventListener('resize', queue);
        if (document.fonts && document.fonts.ready) document.fonts.ready.then(queue).catch(function () {});
        queue(); setTimeout(queue, 200); setTimeout(queue, 600);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', installHeight, { once: true });
    else installHeight();
})();
</script>
</body>
</html>
